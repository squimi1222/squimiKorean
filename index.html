<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="韓文學習">
<meta name="theme-color" content="#1a1a1a">
<title>한국어 학습 · 韓文學習本</title>
<link rel="icon" href="babybear.ico" type="image/x-icon">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#efede8;
  --text:#1a1a1a;--text2:#6b6b67;--text3:#9d9b96;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:680px;margin:0 auto;padding-bottom:80px}
.header{padding:env(safe-area-inset-top,16px) 16px 10px;background:var(--bg);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:5}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-size:20px;font-weight:600;color:var(--text)}
.app-subtitle{font-size:12px;color:var(--text2);margin-top:2px}
.header-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;transition:background .15s}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{opacity:0.85}
.btn-sm{padding:4px 8px;font-size:12px}
.btn-icon{padding:6px 9px}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;font-size:14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;font-family:inherit}
.search-wrap input:focus{border-color:var(--text3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.filter-bar{padding:10px 16px;border-bottom:0.5px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--bg)}
.cat-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.chip{padding:4px 10px;font-size:12px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.chip:active{transform:scale(0.95)}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.status-select{font-size:12px;padding:5px 8px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit}
.stats-bar{padding:8px 16px;display:flex;gap:12px;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.stat{text-align:center;flex:1}
.stat-num{font-size:16px;font-weight:600;color:var(--text)}
.stat-label{font-size:11px;color:var(--text2)}
.word-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.word-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 14px;transition:border-color .15s}
.word-card:hover{border-color:var(--border2)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-left{flex:1;min-width:0}
.korean-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.korean-text{font-size:21px;font-weight:600;letter-spacing:0.3px;color:var(--text)}
.chinese-row{display:flex;align-items:center;gap:6px}
.chinese-text{font-size:14px;color:var(--text2)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.status-badge{padding:3px 8px;font-size:11px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.status-new{background:#E6F1FB;color:#0C447C}
.status-learning{background:#FAEEDA;color:#633806}
.status-learned{background:#EAF3DE;color:#27500A}
.cat-badge{font-size:11px;color:var(--text2);background:var(--bg2);padding:2px 7px;border-radius:5px}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 6px;border-radius:4px}
.card-actions{display:flex;gap:4px}
.example-box{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
.example-text{font-size:13px;color:var(--text2);line-height:1.6}
.empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:14px}
.empty-icon{font-size:40px;display:block;margin-bottom:10px;opacity:0.35}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:20;justify-content:flex-start;align-items:flex-end}
.overlay.active{display:flex}
@media(min-width:480px){.overlay{align-items:center}}
.modal{background:#ffffff;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 20px calc(env(safe-area-inset-bottom,0px) + 20px);width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,0.15)}
@media(prefers-color-scheme:dark){.modal{background:#2c2c2e}}
@media(min-width:480px){.modal{border-radius:var(--radius-lg);max-width:480px;margin:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.25)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px;display:block}
@media(min-width:480px){.modal-handle{display:none}}
.modal-title{font-size:16px;font-weight:600}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.form-input{width:100%;padding:9px 11px;font-size:14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
.form-input:focus{border-color:var(--text);background:var(--bg)}
textarea.form-input{resize:vertical;min-height:64px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.modal-footer{display:flex;gap:8px;margin-top:16px}
.modal-footer .btn{flex:1;justify-content:center;padding:10px}
.speak-btn{display:inline-flex;align-items:center;padding:3px 8px;font-size:13px;border:0.5px solid var(--border);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.speak-btn:hover{background:var(--bg2)}
.speak-btn.speaking{color:#0C447C;border-color:#B5D4F4;background:#E6F1FB}
/* danger btn */
.btn-danger{color:#A32D2D}
/* install banner */
.install-banner{display:none;padding:10px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);font-size:13px;color:var(--text2);align-items:center;gap:10px}
.install-banner.show{display:flex}
</style>
</head>
<body>
<div class="install-banner" id="installBanner">
  <i class="ti ti-brand-safari" style="font-size:18px;flex-shrink:0"></i>
  <span>在 iOS 上：點 <strong>分享</strong> → <strong>加入主畫面</strong> 即可像 App 使用</span>
  <button class="btn btn-sm" style="margin-left:auto;flex-shrink:0" onclick="document.getElementById('installBanner').classList.remove('show')">✕</button>
</div>
<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="app-title">한국어 학습 <span style="font-size:13px;font-weight:400;color:var(--text3)">韓文學習本</span></div>
        <div class="app-subtitle" id="subtitle">0 個單字</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-icon" id="exportBtn" title="匯出 JSON"><i class="ti ti-download"></i></button>
        <button class="btn btn-icon" id="importBtn" title="匯入 JSON"><i class="ti ti-upload"></i></button>
        <button class="btn btn-primary" id="addBtn"><i class="ti ti-plus"></i> 新增</button>
      </div>
    </div>
    <div class="search-wrap">
      <i class="ti ti-search search-icon"></i>
      <input type="text" id="searchInput" placeholder="搜尋韓文、中文或例句...">
    </div>
  </div>
  <div class="filter-bar">
    <div class="cat-chips" id="catChips"></div>
    <select class="status-select" id="statusSelect">
      <option value="all">全部狀態</option>
      <option value="new">未學習</option>
      <option value="learning">學習中</option>
      <option value="learned">已學會</option>
    </select>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="word-list" id="wordList"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">新增單字</span>
      <button class="btn btn-icon" id="closeModal"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label">韓文 *</label>
      <input class="form-input" id="fKorean" placeholder="예: 안녕하세요" style="font-size:18px">
    </div>
    <div class="form-group">
      <label class="form-label">中文翻譯 *</label>
      <input class="form-input" id="fChinese" placeholder="例: 你好">
    </div>
    <div class="form-group">
      <label class="form-label">韓文例句（選填）</label>
      <textarea class="form-input" id="fExample" placeholder="加入一個韓文例句..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">分類</label>
        <select class="form-input" id="fCategory"></select>
      </div>
      <div class="form-group">
        <label class="form-label">學習狀態</label>
        <select class="form-input" id="fStatus">
          <option value="new">未學習</option>
          <option value="learning">學習中</option>
          <option value="learned">已學會</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">標籤（逗號分隔）</label>
      <input class="form-input" id="fTags" placeholder="例: 基礎, TOPIK, 生活">
    </div>
    <div class="modal-footer">
      <button class="btn" id="cancelBtn">取消</button>
      <button class="btn btn-primary" id="saveBtn">儲存</button>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none">

<script>
const CATS = ["全部","打招呼","數字","日常生活","食物","交通","購物","情感","語法","動詞","形容詞","其他"];
const STATUS = {new:{label:"未學習",cls:"status-new"},learning:{label:"學習中",cls:"status-learning"},learned:{label:"已學會",cls:"status-learned"}};
const CYCLE = {new:"learning",learning:"learned",learned:"new"};
const STORE_KEY = "korean-vocab-data";

// Load from localStorage
function loadWords() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || getDefaults(); }
  catch(e) { return getDefaults(); }
}
function saveWords() { localStorage.setItem(STORE_KEY, JSON.stringify(words)); }

function getDefaults() {
  return [
    {id:1,korean:"안녕하세요",chinese:"你好（正式）",example:"안녕하세요! 처음 뵙겠습니다.",category:"打招呼",tags:["基礎","敬語"],status:"learned",createdAt:"2026-05-10"},
    {id:2,korean:"감사합니다",chinese:"謝謝（正式）",example:"도와주셔서 정말 감사합니다.",category:"打招呼",tags:["基礎","敬語"],status:"learned",createdAt:"2026-05-10"},
    {id:3,korean:"괜찮아요",chinese:"沒關係／還好",example:"걱정하지 마세요. 저 괜찮아요.",category:"日常生活",tags:["基礎"],status:"learning",createdAt:"2026-05-10"},
    {id:4,korean:"맛있어요",chinese:"好吃",example:"이 김치찌개 정말 맛있어요!",category:"食物",tags:["生活"],status:"learning",createdAt:"2026-05-10"},
    {id:5,korean:"사랑해요",chinese:"我愛你",example:"당신을 사랑해요.",category:"情感",tags:["浪漫"],status:"new",createdAt:"2026-05-10"},
    {id:6,korean:"얼마예요?",chinese:"多少錢？",example:"이 가방 얼마예요?",category:"購物",tags:["實用"],status:"new",createdAt:"2026-05-10"},
  ];
}

let words = loadWords();
let nextId = Math.max(...words.map(w=>w.id), 10) + 1;
let search = "", catFilter = "全部", statusFilter = "all", expandedId = null, editId = null;

function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function speak(text, lang, btn) {
  // Bug 3 修復：檢查 text 是否為空
  if(!text) return;
  
  if(btn) { 
    document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('speaking')); 
    btn.classList.add('speaking'); 
  }
  
  speechSynthesis.cancel();
  
  const langCode = lang === 'ko-KR' ? 'ko' : 'zh-TW';
  const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${langCode}&client=tw-ob`;
  
  // Bug 4 修復：先設定 preload 再載入
  const audio = new Audio();
  audio.preload = 'auto';
  audio.src = url;
  audio.load();  // Bug 1 修復：在 play() 之前呼叫
  
  // Bug 1 修復：play() 在 load() 之後
  return audio.play().catch(error => {
    console.log('Google TTS 播放失敗:', error);
    if(btn) btn.classList.remove('speaking');
    // Bug 2 修復：失敗時使用瀏覽器語音備援
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = lang === 'ko-KR' ? 0.75 : 0.85;
    speechSynthesis.speak(u);
  });
}function filtered() {
  return words.filter(w => {
    const s = search.toLowerCase();
    const ms = !s || w.korean.includes(s) || w.chinese.includes(s) || (w.example||"").includes(s) || w.tags.some(t=>t.includes(s));
    const mc = catFilter === "全部" || w.category === catFilter;
    const mst = statusFilter === "all" || w.status === statusFilter;
    return ms && mc && mst;
  });
}

function renderStats() {
  document.getElementById("subtitle").textContent = `共 ${words.length} 個單字`;
  const n=words.filter(w=>w.status==="new").length;
  const l=words.filter(w=>w.status==="learning").length;
  const d=words.filter(w=>w.status==="learned").length;
  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><div class="stat-num">${words.length}</div><div class="stat-label">全部</div></div>
    <div class="stat"><div class="stat-num" style="color:#0C447C">${n}</div><div class="stat-label">未學習</div></div>
    <div class="stat"><div class="stat-num" style="color:#633806">${l}</div><div class="stat-label">學習中</div></div>
    <div class="stat"><div class="stat-num" style="color:#27500A">${d}</div><div class="stat-label">已學會</div></div>`;
}

function renderCats() {
  const cats = CATS.filter(c => c === "全部" || words.some(w=>w.category===c));
  document.getElementById("catChips").innerHTML = cats.map(c =>
    `<button class="chip${catFilter===c?" active":""}" data-cat="${c}">${c}</button>`).join("");
}

function renderList() {
  const list = filtered();
  const el = document.getElementById("wordList");
  if(!list.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon"><i class="ti ti-books"></i></span>${search?"找不到符合的單字":"還沒有單字，點擊「新增」開始學習！"}</div>`;
    return;
  }
  el.innerHTML = list.map(w => {
    const exp = expandedId === w.id;
    return `<div class="word-card" data-id="${w.id}">
      <div class="card-top">
        <div class="card-left">
          <div class="korean-row">
            <span class="korean-text">${esc(w.korean)}</span>
            <button class="speak-btn" data-speak="ko" data-text="${esc(w.korean)}" title="播放韓文"><i class="ti ti-volume"></i></button>
          </div>
          <div class="chinese-row">
            <span class="chinese-text">${esc(w.chinese)}</span>
            <button class="speak-btn" data-speak="zh" data-text="${esc(w.chinese)}" title="播放中文"><i class="ti ti-volume"></i></button>
          </div>
        </div>
        <div class="card-right">
          <button class="status-badge ${STATUS[w.status].cls}" data-cycle="${w.id}" title="點擊切換狀態">${STATUS[w.status].label}</button>
          <span class="cat-badge">${esc(w.category)}</span>
        </div>
      </div>
      ${exp && w.example ? `<div class="example-box">
        <div class="example-text">${esc(w.example)}</div>
        <button class="speak-btn" data-speak="ko" data-text="${esc(w.example)}" style="margin-top:7px;font-size:12px"><i class="ti ti-volume" style="margin-right:4px"></i>播放例句</button>
      </div>` : ""}
      <div class="card-bottom">
        <div class="tags">${w.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join("")}</div>
        <div class="card-actions">
          ${w.example ? `<button class="btn btn-sm" data-expand="${w.id}">${exp?"收起":"例句"}</button>` : ""}
          <button class="btn btn-sm btn-icon" data-edit="${w.id}" title="編輯"><i class="ti ti-edit"></i></button>
          <button class="btn btn-sm btn-icon btn-danger" data-del="${w.id}" title="刪除"><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function render() { renderStats(); renderCats(); renderList(); }

function openModal(word) {
  editId = word ? word.id : null;
  document.getElementById("modalTitle").textContent = word ? "編輯單字" : "新增單字";
  document.getElementById("fKorean").value = word?.korean || "";
  document.getElementById("fChinese").value = word?.chinese || "";
  document.getElementById("fExample").value = word?.example || "";
  document.getElementById("fCategory").value = word?.category || "打招呼";
  document.getElementById("fStatus").value = word?.status || "new";
  document.getElementById("fTags").value = word?.tags?.join(", ") || "";
  document.getElementById("overlay").classList.add("active");
  setTimeout(() => document.getElementById("fKorean").focus(), 100);
}

function closeModal() { document.getElementById("overlay").classList.remove("active"); }

function saveWord() {
  const korean = document.getElementById("fKorean").value.trim();
  const chinese = document.getElementById("fChinese").value.trim();
  if(!korean || !chinese) { alert("請填寫韓文與中文翻譯"); return; }
  const w = {
    korean, chinese,
    example: document.getElementById("fExample").value.trim(),
    category: document.getElementById("fCategory").value,
    status: document.getElementById("fStatus").value,
    tags: document.getElementById("fTags").value.split(",").map(t=>t.trim()).filter(Boolean),
    createdAt: new Date().toISOString().slice(0,10)
  };
  if(editId) { words = words.map(x => x.id===editId ? {...x,...w} : x); }
  else { words.push({...w, id: ++nextId}); }
  saveWords(); closeModal(); render();
}

document.addEventListener("click", e => {
  const s = e.target.closest("[data-speak]");
  if(s) { speak(s.dataset.text, s.dataset.speak==="ko"?"ko-KR":"zh-TW", s); return; }
  if(e.target.closest("[data-cat]")) { catFilter=e.target.closest("[data-cat]").dataset.cat; render(); return; }
  if(e.target.closest("[data-cycle]")) { const id=+e.target.closest("[data-cycle]").dataset.cycle; words=words.map(w=>w.id===id?{...w,status:CYCLE[w.status]}:w); saveWords(); render(); return; }
  if(e.target.closest("[data-expand]")) { const id=+e.target.closest("[data-expand]").dataset.expand; expandedId=expandedId===id?null:id; render(); return; }
  if(e.target.closest("[data-edit]")) { openModal(words.find(x=>x.id===+e.target.closest("[data-edit]").dataset.edit)); return; }
  if(e.target.closest("[data-del]")) { const id=+e.target.closest("[data-del]").dataset.del; if(confirm("確定刪除？")) { words=words.filter(w=>w.id!==id); if(expandedId===id) expandedId=null; saveWords(); render(); } return; }
  if(e.target.closest("#addBtn")) { openModal(); return; }
  if(e.target.closest("#closeModal")||e.target.closest("#cancelBtn")) { closeModal(); return; }
  if(e.target.closest("#saveBtn")) { saveWord(); return; }
  if(e.target===document.getElementById("overlay")) { closeModal(); return; }
  if(e.target.closest("#exportBtn")) {
    const blob=new Blob([JSON.stringify(words,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="korean-vocab.json"; a.click(); return;
  }
  if(e.target.closest("#importBtn")) { document.getElementById("importFile").click(); return; }
});

document.getElementById("importFile").addEventListener("change", e => {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error();
      if(confirm(`匯入 ${data.length} 筆資料？（會合併到現有單字）`)) {
        const existIds = new Set(words.map(w=>w.id));
        const newOnes = data.filter(w=>!existIds.has(w.id));
        words = [...words, ...newOnes];
        nextId = Math.max(...words.map(w=>w.id), nextId) + 1;
        saveWords(); render(); alert(`成功匯入 ${newOnes.length} 筆新單字！`);
      }
    } catch { alert("JSON 格式錯誤，請確認檔案正確"); }
    e.target.value = "";
  };
  r.readAsText(f);
});

document.getElementById("searchInput").addEventListener("input", e => { search=e.target.value; render(); });
document.getElementById("statusSelect").addEventListener("change", e => { statusFilter=e.target.value; render(); });

// Populate category select
CATS.filter(c=>c!=="全部").forEach(c => {
  const opt=document.createElement("option"); opt.value=c; opt.textContent=c;
  document.getElementById("fCategory").appendChild(opt);
});
